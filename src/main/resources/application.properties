spring.application.name=app
# Datos de la conexi\u00f3n
spring.datasource.url=jdbc:mysql://localhost:3306/Inventario?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root1234

# Fuerza a Hibernate a usar el motor de MySQL correctamente
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Evita problemas de nombres entre Java (CamelCase) y SQL (snake_case)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Configuraci\u00f3n de JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true