<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Trabajador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .form-control-lg { border-radius: 12px; }
        .btn-lg { border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body class="p-4 p-md-5">

<div class="container">
    <div class="card shadow-lg border-0 mx-auto" style="max-width: 500px; border-radius: 20px;">
        <div class="card-body p-4 p-md-5">
            
            <h3 class="fw-bold mb-4 text-center text-dark">
                <i class="fas fa-user-plus me-2 text-primary"></i>Registro de Personal
            </h3>
            
            <form th:action="@{/empleados/guardar}" th:object="${empleado}" method="post">
                
                <div class="mb-3">
                    <label class="form-label fw-bold text-primary">Número de Ficha / Operario</label>
                    <input type="number" th:field="*{numeroEmp}" class="form-control form-control-lg" 
                           placeholder="Ej: 101" required>
                    <small class="text-muted">Asigna el número de ficha oficial del trabajador.</small>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control form-control-lg" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">Apellidos</label>
                    <input type="text" th:field="*{apellidos}" class="form-control form-control-lg" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg py-3">
                        <i class="fas fa-save me-2"></i>GUARDAR TRABAJADOR
                    </button>
                    <a href="/inventario" class="btn btn-light btn-lg text-muted">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
