<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reporte de Movimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { margin-top: 50px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-pdf { background-color: #d9534f; border: none; color: white; transition: 0.3s; }
        .btn-pdf:hover { background-color: #c9302c; color: white; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0"><i class="bi bi-file-earmark-pdf-fill me-2"></i>Generar Reporte Personalizado</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted text-center">Filtre por trabajador y rango de fechas para obtener el PDF.</p>
                    
                    <form th:action="@{/reporte-pdf}" method="get" id="formReporte">
    
    <div class="mb-4">
        <label class="form-label fw-bold">Trabajador:</label>
        <select name="idEmpleado" id="idEmpleado" class="form-select form-select-lg" required>
            <option value="" selected disabled>-- Seleccione un trabajador --</option>
            <option th:each="emp : ${empleados}" 
                    th:value="${emp.idEmpleado}" 
                    th:text="${emp.nombre + ' ' + emp.apellidos}"></option>
        </select>
    </div>

    <div class="row mb-4">
        <div class="col-md-6">
            <label class="form-label fw-bold">Desde:</label>
            <input type="date" name="fechaInicio" id="fechaInicio" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label fw-bold">Hasta:</label>
            <input type="date" name="fechaFin" id="fechaFin" class="form-control" required>
        </div>
    </div>

    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-pdf btn-lg">
            <i class="bi bi-download me-2"></i> Generar Reporte PDF
        </button>
        <a th:href="@{/inventario}" class="btn btn-outline-secondary">Volver al Inventario</a>
    </div>
</form>
                </div>
                <div class="card-footer text-center text-muted small">
                    Sistema de Gestión de Almacén &copy; 2026
                </div>
            </div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</body>
</html>
