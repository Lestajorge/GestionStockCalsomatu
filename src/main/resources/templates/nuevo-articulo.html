<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Artículo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light p-4">

<div class="container">
    <div class="card shadow border-0 mx-auto" style="max-width: 500px; border-radius: 20px;">
        <div class="card-body p-4">
            <h3 class="fw-bold mb-4 text-center">Alta de Material</h3>
            
            <form th:action="@{/articulos/guardar}" th:object="${articulo}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre del Artículo</label>
                    <input type="text" th:field="*{nombre}" class="form-control form-control-lg" 
                           placeholder="Ej: Radial Grande Bosch" required>
                    <small class="text-muted">Si incluyes 'Radial' o 'Taladro' saldrá su icono.</small>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Stock Inicial</label>
                    <input type="number" th:field="*{cantidad}" class="form-control form-control-lg" 
                           value="0" min="0">
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg rounded-pill fw-bold py-3">
                        <i class="fas fa-check-circle me-2"></i> GUARDAR EN LISTA
                    </button>
                    <a href="/inventario" class="btn btn-light btn-lg rounded-pill text-muted">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
